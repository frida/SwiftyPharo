name: VM

on:
  push:
    tags:
      - vm-*
  pull_request:
    paths:
      - tools/**
      - .github/workflows/vm.yml
  workflow_dispatch:

jobs:
  slice:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos, ios, iossimulator]
    runs-on: macos-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: brew install meson freetype

      - name: Build VM
        run: tools/build-vm.sh
        env:
          PLATFORM: ${{ matrix.platform }}

      # A framework carries symlinks, which the artifact upload does not keep.
      - name: Archive slice
        run: tar -czf slice.tar.gz -C artifacts/slices .

      - name: Upload slice
        uses: actions/upload-artifact@v7
        with:
          name: slice-${{ matrix.platform }}
          path: slice.tar.gz

      # The macOS build is the only one that yields a runnable Pharo CLI.
      - name: Build image
        if: matrix.platform == 'macos'
        run: tools/build-image.sh

      - name: Upload image
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: image
          path: artifacts/SwiftyPharo.image.zip

  xcframework:
    needs: slice
    runs-on: macos-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Download slices
        uses: actions/download-artifact@v8
        with:
          pattern: slice-*
          path: archives/

      - name: Unpack slices
        run: |
          mkdir -p artifacts/slices
          for archive in archives/*/slice.tar.gz; do
            tar -xzf "${archive}" -C artifacts/slices
          done

      - name: Download image
        uses: actions/download-artifact@v8
        with:
          name: image
          path: artifacts/

      - name: Create xcframework
        run: tools/make-xcframework.sh | tee artifacts.txt

      - name: Upload xcframework
        uses: actions/upload-artifact@v7
        with:
          name: PharoVM.xcframework
          path: artifacts/PharoVM.xcframework.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/vm-')
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts.txt
          files: |
            artifacts/PharoVM.xcframework.zip
            artifacts/SwiftyPharo.image.zip
